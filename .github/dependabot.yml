version: 2
updates:
  - package-ecosystem: "uv"
    directory: "./"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 28
    target-branch: "develop"

  - package-ecosystem: "docker"
    directory: "./"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 28
    target-branch: "develop"

  - package-ecosystem: "docker-compose"
    directory: "./"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 28
    target-branch: "develop"
    allow:
      - dependency-name: "ghcr.io/postgres/postgres"
    ignore:
      - dependency-name: "ghcr.io/postgres/postgres"
        update-types: 
          - "version-update:semver-patch"
